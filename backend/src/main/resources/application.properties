# ==============================
# Server
# ==============================
server.port=8082
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.timeout=3600s
# ==============================
# Redis
# ==============================
spring.data.redis.host=redis
spring.data.redis.port=6379
# ==============================
# Database (Remote MySQL)
# ==============================
spring.datasource.url=jdbc:mysql://8.155.47.138:3306/bee_musical?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.sql.init.mode=never
# ==============================
# Aliyun OSS
# ==============================
# OSS SDK 连接端点，仅供后端管理 OSS 使用
aliyun.oss.endpoint=https://oss-cn-heyuan.aliyuncs.com
# 资源直连 OSS 时使用的公网域名
aliyun.oss.public-direct-base-url=https://bees-bucket.oss-cn-heyuan.aliyuncs.com
# CDN 加速开启时使用的公网域名
aliyun.oss.public-cdn-base-url=https://cdn.beemusic.fun
# 默认资源访问模式：true=CDN，false=OSS直连
aliyun.oss.cdn-enabled-default=true
aliyun.oss.bucket-name=bees-bucket
aliyun.oss.access-key=${ALIYUN_OSS_ACCESS_KEY}
aliyun.oss.secret-key=${ALIYUN_OSS_SECRET_KEY}
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.session=DEBUG
# ==============================
# GZIP Compression
# ==============================
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
server.compression.min-response-size=1024
