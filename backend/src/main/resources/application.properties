# ==============================
# Server
# ==============================
server.port=${SERVER_PORT:8082}
server.servlet.session.cookie.http-only=${SERVER_SESSION_COOKIE_HTTP_ONLY:true}
server.servlet.session.cookie.secure=${SERVER_SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.max-age=${SERVER_SESSION_COOKIE_MAX_AGE:14d}
server.servlet.session.timeout=${SERVER_SESSION_TIMEOUT:14d}
# ==============================
# Redis
# ==============================
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
# ==============================
# Database (Remote MySQL)
# ==============================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.sql.init.mode=never
# ==============================
# Aliyun OSS
# ==============================
aliyun.oss.endpoint=${ALIYUN_OSS_ENDPOINT:https://oss-cn-heyuan.aliyuncs.com}
aliyun.oss.bucket-name=${ALIYUN_OSS_BUCKET_NAME:bees-bucket}
aliyun.oss.access-key=${ALIYUN_OSS_ACCESS_KEY}
aliyun.oss.secret-key=${ALIYUN_OSS_SECRET_KEY}
# 签名链接过期时间（小时），默认 24
aliyun.oss.expiration-hours=${ALIYUN_OSS_EXPIRATION_HOURS:24}
logging.level.org.springframework.security=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:INFO}
logging.level.org.springframework.session=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SESSION:INFO}
# ==============================
# GZIP Compression
# ==============================
server.compression.enabled=${SERVER_COMPRESSION_ENABLED:true}
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
server.compression.min-response-size=${SERVER_COMPRESSION_MIN_RESPONSE_SIZE:1024}
